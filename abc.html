<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SPARKLE ✦ KITCHEN · white luxury</title>
  <!-- Tailwind + brightness overload -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js (reactive core) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Font Awesome 6 (crisp icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- shimmering background effect -->
  <style>
    /* import ultra-clean fonts */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #111827;
      position: relative;
      overflow-x: hidden;
    }
    
    /* SPARKLE OVERLAY — PRODUCTION GRADE SHIMMER */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.3) 40%, transparent 70%),
                  repeating-linear-gradient(45deg, rgba(255,255,240,0.2) 0px, rgba(255,255,240,0.2) 2px, rgba(255,255,255,0.5) 2px, rgba(255,255,255,0.5) 4px);
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: overlay;
      animation: sparkleDrift 20s infinite linear;
      opacity: 0.25;
    }
    
    @keyframes sparkleDrift {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(2deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }
    
    /* additional floating gleam */
    .gleam {
      position: relative;
      overflow: hidden;
    }
    
    .gleam::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      mix-blend-mode: soft-light;
    }
    
    .gleam:hover::after {
      opacity: 0.6;
    }
    
    /* premium white card with extra sparkle */
    .card-crystal {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 36px;
      box-shadow: 0 25px 50px -18px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.8) inset, 0 0 30px rgba(255,255,255,0.6);
      transition: all 0.25s cubic-bezier(0.2,0.9,0.3,1.1);
    }
    
    .card-crystal:hover {
      box-shadow: 0 35px 65px -20px rgba(0,20,40,0.2), 0 0 0 2px rgba(255,255,255,0.9) inset, 0 0 50px rgba(255,255,255,0.8);
      transform: translateY(-6px) scale(1.01);
      background: rgba(255, 255, 255, 0.95);
    }
    
    /* category pill — bright, glassy */
    .pill-diamond {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.9);
      color: #1e293b;
      font-weight: 500;
      padding: 0.75rem 1.8rem;
      border-radius: 60px;
      box-shadow: 0 8px 20px -12px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.5) inset;
      transition: 0.2s;
      white-space: nowrap;
    }
    
    .pill-diamond.active {
      background: #ffffff;
      border-color: #ffffff;
      color: #0b1120;
      font-weight: 600;
      box-shadow: 0 15px 30px -15px #b0c4de, 0 0 0 2px #ffffff inset, 0 0 40px rgba(255,255,255,0.9);
    }
    
    /* sticky header — pure light */
    .header-light {
      backdrop-filter: blur(20px) saturate(200%);
      background: rgba(255, 255, 255, 0.5);
      border-bottom: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 10px 30px -20px #b0c4de;
    }
    
    /* quantity button — white iridescent */
    .btn-sparkle {
      background: white;
      border: 1px solid rgba(255,255,255,0.9);
      color: #1e293b;
      width: 40px;
      height: 40px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 5px 15px -8px #334155, 0 0 0 1px rgba(255,255,255,0.8) inset;
      transition: 0.15s;
    }
    
    .btn-sparkle:hover {
      background: #f8fafc;
      transform: scale(1.1);
      box-shadow: 0 12px 25px -15px #94a3b8, 0 0 0 2px white inset;
    }
    
    /* cart drawer — liquid white */
    .drawer-liquid {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(30px);
      border-left: 1px solid rgba(255,255,255,0.9);
      box-shadow: -30px 0 60px -30px rgba(0,0,0,0.08), 0 0 30px rgba(255,255,255,0.8);
    }
    
    /* toast — pure brilliance */
    .toast-brilliant {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 60px;
      box-shadow: 0 25px 45px -20px #64748b, 0 0 0 1px rgba(255,255,255,1) inset, 0 0 40px rgba(255,255,255,0.8);
      color: #0f172a;
    }
    
    /* floating spark animation */
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.2; transform: scale(1); }
    }
    
    .twinkle {
      animation: twinkle 3s infinite;
    }
    
    /* custom scroll */
    ::-webkit-scrollbar {
      width: 5px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }
    
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="antialiased selection:bg-white selection:text-slate-900">

<!-- ALPINE STORE — OVER SHINING PRODUCTION READY -->
<div x-data="{
  cart: [],
  activeCategory: 'all',
  showCart: false,
  showCheckoutModal: false,
  toast: { visible: false, message: '' },
  orderId: 'ORD-' + Math.floor(800000 + Math.random()*200000),
  
  // premium bright menu (ultra HD unsplash)
  meals: [
    { id: 1, name: 'Sparkling Shrimp', desc: 'citrus glaze, microgreens, chili', price: 14.90, category: 'starters', image: 'https://images.unsplash.com/photo-1625944230945-1b7a3c76e3d0?w=400&auto=format' },
    { id: 2, name: 'White Truffle Arancini', desc: 'parmesan foam, gold leaf', price: 18.50, category: 'starters', image: 'https://images.unsplash.com/photo-1626074353765-517a681e40be?w=400&auto=format' },
    { id: 3, name: 'Glazed Lobster Tail', desc: 'champagne butter, asparagus', price: 42.00, category: 'main', image: 'https://images.unsplash.com/photo-1584277261846-865f3daeb22d?w=400&auto=format' },
    { id: 4, name: 'Wagyu Filet Mignon', desc: 'truffle demi, potato puree', price: 59.90, category: 'main', image: 'https://images.unsplash.com/photo-1600891964092-4316c288032e?w=400&auto=format' },
    { id: 5, name: 'Saffron Risotto', desc: 'lobster medallions, parsley oil', price: 32.50, category: 'main', image: 'https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=400&auto=format' },
    { id: 6, name: 'Diamond Martini', desc: 'grey goose, olive, crystal ice', price: 16.00, category: 'drinks', image: 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=400&auto=format' },
    { id: 7, name: 'Sparkling Rosé', desc: 'french bubbles, strawberry', price: 14.00, category: 'drinks', image: 'https://images.unsplash.com/photo-1558642084-fd07fae5285b?w=400&auto=format' },
    { id: 8, name: 'Crystal Cheesecake', desc: 'berries, edible glitter', price: 13.90, category: 'desserts', image: 'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=400&auto=format' },
    { id: 9, name: 'White Chocolate Mousse', desc: 'passion fruit gel, gold dust', price: 12.90, category: 'desserts', image: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&auto=format' }
  ],
  
  categories: [
    { id: 'all', name: 'All' },
    { id: 'starters', name: 'Starters' },
    { id: 'main', name: 'Mains' },
    { id: 'drinks', name: 'Drinks' },
    { id: 'desserts', name: 'Desserts' }
  ],

  get filteredMeals() {
    if (this.activeCategory === 'all') return this.meals;
    return this.meals.filter(m => m.category === this.activeCategory);
  },
  
  get cartCount() {
    return this.cart.reduce((acc, i) => acc + i.quantity, 0);
  },
  
  get cartTotal() {
    return this.cart.reduce((acc, i) => acc + (i.price * i.quantity), 0).toFixed(2);
  },
  
  addToCart(meal) {
    const found = this.cart.find(i => i.id === meal.id);
    if (found) {
      found.quantity++;
    } else {
      this.cart.push({ ...meal, quantity: 1 });
    }
  },
  
  removeOne(mealId) {
    const idx = this.cart.findIndex(i => i.id === mealId);
    if (idx !== -1) {
      if (this.cart[idx].quantity > 1) {
        this.cart[idx].quantity--;
      } else {
        this.cart.splice(idx, 1);
      }
    }
  },
  
  clearCart() {
    this.cart = [];
  },
  
  placeOrder() {
    if (this.cart.length === 0) {
      this.toast = { visible: true, message: '✨ add some sparkle to your cart ✨' };
      setTimeout(() => this.toast.visible = false, 2000);
      return;
    }
    this.orderId = 'ORD-' + Math.floor(800000 + Math.random()*200000);
    this.showCheckoutModal = true;
  },
  
  confirmOrder() {
    this.showCheckoutModal = false;
    this.showCart = false;
    this.clearCart();
    this.toast = { visible: true, message: '🍽️ YOUR ORDER HAS BEEN SENT TO THE KITCHEN. PLEASE CHECK YOUR WHATSAPP FOR ORDER DETAILS.' };
    setTimeout(() => this.toast.visible = false, 4000);
  }
}"
x-init="activeCategory = 'all'"
class="max-w-7xl mx-auto px-4 sm:px-5 lg:px-8 pb-24 relative"
>

<!-- ===== HEADER — STICKY SHIMMER ===== -->
<header class="sticky top-0 z-50 header-light py-4 flex items-center justify-between rounded-[3rem] px-5 mt-1 mb-5 backdrop-blur-xl">
  <div class="flex items-center gap-3">
    <div class="w-11 h-11 rounded-full bg-white/90 shadow-xl flex items-center justify-center twinkle">
      <i class="fas fa-star text-xl text-slate-700"></i>
    </div>
    <span class="text-3xl sm:text-4xl font-bold text-slate-800 tracking-tight" style="font-family: 'Quicksand', sans-serif; font-weight: 700; font-style: italic;">sparkle kitchen</span>
  </div>
  <button @click="showCart = true" class="relative p-3 rounded-full bg-white/90 shadow-xl border border-white/80 group">
    <i class="fas fa-bag-shopping text-2xl text-slate-700 group-hover:scale-110 transition"></i>
    <span x-show="cartCount > 0" x-cloak class="absolute -top-2 -right-2 bg-white text-slate-800 text-xs font-bold px-2 py-1 rounded-full min-w-[24px] text-center shadow-xl border border-white/90">{{ cartCount }}</span>
  </button>
</header>

<!-- ===== CATEGORY PILLS — GLASS DIAMOND ===== -->
<div class="my-5 flex flex-nowrap md:flex-wrap gap-2 overflow-x-auto pb-3 no-scrollbar md:justify-start">
  <template x-for="cat in categories" :key="cat.id">
    <button @click="activeCategory = cat.id"
      :class="{ 'active': activeCategory === cat.id }"
      class="pill-diamond text-sm sm:text-base transition-all duration-300">
      <span x-text="cat.name"></span>
    </button>
  </template>
</div>

<!-- ===== MEALS GRID — CRYSTAL CARDS ===== -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-7 mt-3">
  <template x-for="meal in filteredMeals" :key="meal.id">
    <div class="card-crystal p-4 flex flex-col gleam">
      <!-- image wrapper with shine -->
      <div class="rounded-[28px] overflow-hidden bg-white/50 border border-white/60 shadow-inner">
        <img :src="meal.image" :alt="meal.name" class="w-full h-48 object-cover transition duration-700 hover:scale-110">
      </div>
      
      <div class="mt-4 flex-1">
        <h3 class="text-2xl font-bold text-slate-800" x-text="meal.name"></h3>
        <p class="text-sm text-slate-500 mt-1.5 leading-relaxed" x-text="meal.desc"></p>
        
        <div class="flex items-center justify-between mt-5">
          <!-- quantity control if in cart -->
          <template x-for="item in cart.filter(i => i.id === meal.id)" :key="item.id">
            <div class="flex items-center space-x-1 bg-white/70 rounded-full border border-white/80 p-0.5 shadow-inner">
              <button @click="removeOne(meal.id)" class="btn-sparkle w-9 h-9 text-sm"><i class="fas fa-minus"></i></button>
              <span class="font-bold w-8 text-center text-slate-800" x-text="item.quantity"></span>
              <button @click="addToCart(meal)" class="btn-sparkle w-9 h-9 text-sm"><i class="fas fa-plus"></i></button>
            </div>
          </template>
          
          <button x-show="!cart.some(i => i.id === meal.id)" @click="addToCart(meal)" 
            class="bg-white hover:bg-slate-50 text-slate-800 px-6 py-3 rounded-full text-sm font-semibold shadow-xl flex items-center gap-2 transition-all border border-white/80">
            <i class="fas fa-sparkles"></i> <span>ADD</span>
          </button>
          
          <span x-show="!cart.some(i => i.id === meal.id)" class="text-xl font-bold text-slate-800">$<span x-text="meal.price.toFixed(2)"></span></span>
        </div>
      </div>
    </div>
  </template>
</div>

<!-- ===== CART DRAWER — LIQUID LIGHT ===== -->
<div x-show="showCart" class="fixed inset-0 z-[100] flex justify-end" @keydown.escape.window="showCart = false">
  <div class="absolute inset-0 bg-white/10 backdrop-blur-[3px]" @click="showCart = false"></div>
  
  <div class="relative w-full max-w-md drawer-liquid h-full shadow-2xl flex flex-col border-l border-white/80"
       x-show="showCart" x-transition:enter="transition ease-out duration-400" x-transition:enter-start="translate-x-full opacity-0" x-transition:enter-end="translate-x-0 opacity-100" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="translate-x-full opacity-0">
    
    <div class="flex items-center justify-between p-6 border-b border-white/80">
      <h2 class="text-3xl font-bold text-slate-800 italic flex items-center gap-2"><i class="fas fa-shopping-bag"></i> your sparkle</h2>
      <button @click="showCart = false" class="w-10 h-10 rounded-full bg-white/90 border border-white text-slate-700 hover:rotate-90 transition"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="flex-1 overflow-y-auto p-6 space-y-5">
      <template x-for="item in cart" :key="item.id">
        <div class="flex items-center gap-4 bg-white/70 p-3 rounded-3xl shadow-lg border border-white/90 backdrop-blur-sm">
          <img :src="item.image" class="w-20 h-20 rounded-2xl object-cover border-2 border-white">
          <div class="flex-1">
            <h4 class="font-extrabold text-slate-800" x-text="item.name"></h4>
            <div class="flex items-center justify-between mt-3">
              <div class="flex items-center border border-white/90 rounded-full bg-white/80">
                <button @click="removeOne(item.id)" class="px-4 py-2 text-slate-700 font-bold text-lg">−</button>
                <span class="px-4 py-2 font-bold" x-text="item.quantity"></span>
                <button @click="addToCart(item)" class="px-4 py-2 text-slate-700 font-bold text-lg">+</button>
              </div>
              <span class="font-black text-xl text-slate-800" x-text="'$' + (item.price * item.quantity).toFixed(2)"></span>
            </div>
          </div>
        </div>
      </template>
      <div x-show="cart.length === 0" class="text-center py-16 text-slate-400 flex flex-col items-center">
        <i class="fas fa-sparkles text-6xl mb-4 opacity-40"></i>
        <p class="text-xl text-slate-500">your cart is quiet</p>
        <p class="text-sm">add some brilliance</p>
      </div>
    </div>
    
    <div class="border-t border-white/80 p-6 bg-white/60 backdrop-blur-xl">
      <div class="flex justify-between items-center text-2xl font-black mb-5">
        <span>TOTAL</span>
        <span class="text-slate-800 text-3xl" x-text="'$' + cartTotal"></span>
      </div>
      <button @click="placeOrder()" class="w-full bg-white hover:bg-slate-50 text-slate-800 font-black py-5 rounded-2xl text-xl shadow-2xl flex items-center justify-center gap-4 border border-white transition-all">
        <i class="fas fa-feather"></i> CHECKOUT
      </button>
    </div>
  </div>
</div>

<!-- ===== CHECKOUT MODAL — GLASS SUMMIT ===== -->
<div x-show="showCheckoutModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4" @keydown.escape.window="showCheckoutModal = false">
  <div class="absolute inset-0 bg-white/20 backdrop-blur-md" @click="showCheckoutModal = false"></div>
  <div class="relative bg-white/80 backdrop-blur-2xl max-w-lg w-full rounded-[3rem] p-8 shadow-2xl border border-white/90"
       x-show="showCheckoutModal" x-transition>
    <div class="flex items-center gap-3 mb-3">
      <i class="fas fa-scroll text-4xl text-slate-700"></i>
      <h3 class="text-3xl font-bold italic text-slate-800">sparkle summary</h3>
    </div>
    <p class="text-sm text-slate-500 font-mono tracking-widest">ref: <span x-text="orderId"></span></p>
    
    <div class="my-6 max-h-60 overflow-y-auto space-y-4 pr-2">
      <template x-for="item in cart" :key="item.id">
        <div class="flex justify-between items-center border-b border-white/80 pb-3">
          <span class="font-medium"><span class="font-black text-slate-800" x-text="item.quantity"></span> x <span class="font-semibold" x-text="item.name"></span></span>
          <span class="font-black text-slate-800" x-text="'$' + (item.price * item.quantity).toFixed(2)"></span>
        </div>
      </template>
    </div>
    
    <div class="flex justify-between text-3xl font-black border-t-2 border-white/90 pt-4">
      <span>∑</span>
      <span class="text-slate-800" x-text="'$' + cartTotal"></span>
    </div>
    
    <div class="flex gap-4 mt-8">
      <button @click="showCheckoutModal = false" class="flex-1 py-4 border-2 border-white/90 rounded-2xl text-slate-700 font-black text-lg hover:bg-white/50">back</button>
      <button @click="confirmOrder()" class="flex-1 bg-white text-slate-800 font-black py-4 rounded-2xl text-lg shadow-xl flex items-center justify-center gap-2 hover:shadow-2xl border border-white">
        <i class="fab fa-whatsapp text-2xl"></i> SEND
      </button>
    </div>
  </div>
</div>

<!-- ===== TOAST — BRILLIANT MESSAGE ===== -->
<div x-show="toast.visible" x-cloak class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] w-full max-w-md px-4">
  <div class="toast-brilliant px-5 py-4 flex items-center gap-3"
       x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-90" x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-90">
    <i class="fas fa-check-circle text-slate-700 text-xl"></i>
    <span class="flex-1 text-sm font-medium text-slate-800" x-text="toast.message"></span>
    <button @click="toast.visible = false" class="opacity-50 hover:opacity-100 text-slate-700"><i class="fas fa-times"></i></button>
  </div>
</div>

<!-- extra style for line clamp and hide -->
<style>
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  [x-cloak] { display: none !important; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
</style>

</div>

<!-- micro sparkle (no gsap needed, pure css shine) -->
</body>
</html>
