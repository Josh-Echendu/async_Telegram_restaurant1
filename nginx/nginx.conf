# auto = use number of CPU cores
# If your server has 4 cores → 4 workers
# ✔ More workers = can handle more users
worker_processes auto;

events {
    # 👉 Each worker can handle 4096 connections at once, 4 workers → 4 × 4096 = ~16k users at same time
    worker_connections 4096;

    # 👉 When many users connect at once: ON → accept many instantly (fast)
    multi_accept on; 
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # =========================
    # LOGGING
    # =========================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for"';

    # 👉 Saves all requests here
    access_log /var/log/nginx/access.log main;

    # 👉 Saves errors only, warn = only important issues
    error_log /var/log/nginx/error.log warn;

    # =========================
    # PERFORMANCE
    # =========================
    sendfile on; # 👉 “Hey, send this file directly to the user — no unnecessary copying.”
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000; # This sets a limit on how many requests can happen during that "open door" period. Setting this high (like 10k)

    # =========================
    # GZIP (Telegram-friendly)
    # =========================
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain application/json application/javascript;

    # =========================
    # UPSTREAM (LOAD BALANCER)
    # =========================

    # docker compose up --scale telegram_bot=3
    upstream fastapi_cluster {
        least_conn; # 👉 “Send new users to the server with the fewest active connections.”

        # max_fails=3 👉 “If this server fails 3 times in a row, consider it broken”
        server telegram_bot_1:8080 max_fails=3 fail_timeout=10s;
        server telegram_bot_2:8080 max_fails=3 fail_timeout=10s; # fail_timeout=10s 👉 “Stop sending traffic to it for 10 seconds”
        server telegram_bot_3:8080 max_fails=3 fail_timeout=10s;

        keepalive 32; # 👉 “Keep up to 32 open connections for each fastapi server”
    }

    # =========================
    # SERVER (HTTPS)
    # =========================
    server {
        listen 80; # Port 80 = HTTP (not secure):  “This block handles requests coming in through HTTP.”
        server_name _; # _ means catch ALL domains

        location /webhook/ {
            proxy_pass http://fastapi_cluster;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
        }
    }

    # server {
    #     # ssl → enable encryption 🔒, 👉 Meaning: “This server handles secure requests”
    #     # http2 → faster communication (modern web standard). "If Telegram supports HTTP/2, use it when talking to me"
