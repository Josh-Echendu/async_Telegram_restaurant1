<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GOLDEN FORK · premium kitchen</title>
  <!-- Tailwind via CDN + custom luxury layer -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js (lightweight reactive) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Font Awesome 6 (free) for crisp icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* golden italic luxury accents + smooth extras */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: #faf7f2;  /* warm premium base */
    }
    .gold-italic {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      background: linear-gradient(135deg, #b68b40 0%, #dbb957 50%, #b68b40 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .gold-border {
      border: 1px solid transparent;
      background: linear-gradient(white, white) padding-box, linear-gradient(145deg, #dbb957, #aa7e3b) border-box;
      border-radius: 1rem;
    }
    .card-shadow {
      box-shadow: 0 12px 30px -8px rgba(100, 70, 20, 0.12), 0 4px 10px -2px rgba(0, 0, 0, 0.02);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-shadow:hover {
      box-shadow: 0 24px 40px -12px rgba(170, 126, 59, 0.2);
      transform: translateY(-2px);
    }
    .sticky-header {
      backdrop-filter: blur(10px);
      background: rgba(255, 252, 245, 0.85);
      border-bottom: 1px solid rgba(219, 185, 87, 0.2);
    }
    .category-pill {
      background: white;
      border: 1px solid #f0e5d8;
      color: #5c4e3d;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      white-space: nowrap;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .category-pill.active {
      background: #1f1a14;
      border-color: #dbb957;
      color: #f9e6b6;
      box-shadow: 0 8px 16px -8px #b68b4070;
    }
    .cart-drawer {
      transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.1, 1), opacity 0.2s;
      box-shadow: -10px 0 30px -15px rgba(0,0,0,0.2);
    }
    .toast-animation {
      animation: slideUpFade 0.3s ease forwards;
    }
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .quantity-btn {
      background: white;
      border: 1px solid #e8dacb;
      color: #b68b40;
      font-weight: 600;
      transition: all 0.15s;
      width: 32px;
      height: 32px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .quantity-btn:hover {
      background: #dbb957;
      border-color: #dbb957;
      color: white;
    }
    /* mobile tap highlight */
    .no-tap-highlight {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body class="antialiased text-[#322b21]">

<!-- ROOT ALPINE STORE & STATE (frontend only) -->
<div x-data="{
  cart: [],
  activeCategory: 'all',
  showCart: false,
  showCheckoutModal: false,
  toast: { show: false, message: '' },
  batchId: 'ORD-' + Math.floor(800000 + Math.random()*200000),
  meals: [
    { id: 1, name: 'Truffle Arancini', desc: 'crispy risotto balls, parmesan & black truffle', price: 14.90, category: 'starters', image: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=400&auto=format' },
    { id: 2, name: 'Wagyu Beef Tartare', desc: 'hand-cut, quail yolk, grilled sourdough', price: 22.50, category: 'starters', image: 'https://images.unsplash.com/photo-1600891964092-4316c288032e?w=400&auto=format' },
    { id: 3, name: 'Lobster Ravioli', desc: 'saffron cream, tarragon, citrus zest', price: 29.90, category: 'main', image: 'https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400&auto=format' },
    { id: 4, name: 'Herb-Crusted Lamb Rack', desc: 'mint gel, roasted heirloom carrots', price: 38.50, category: 'main', image: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=400&auto=format' },
    { id: 5, name: 'Black Truffle Pizza', desc: 'mushroom cream, fontina, arugula', price: 24.90, category: 'main', image: 'https://images.unsplash.com/photo-1604917877934-07d8d248d396?w=400&auto=format' },
    { id: 6, name: 'Golden Passion Spritz', desc: 'prosecco, passion fruit, edible gold dust', price: 13.00, category: 'drinks', image: 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=400&auto=format' },
    { id: 7, name: 'Smoked Old Fashioned', desc: 'bourbon, maple, angostura, cherry smoke', price: 16.00, category: 'drinks', image: 'https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=400&auto=format' },
    { id: 8, name: 'Glistening Panna Cotta', desc: 'vanilla bean, gold leaf, berry coulis', price: 11.90, category: 'desserts', image: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&auto=format' },
    { id: 9, name: 'Chocolate Gold Bar', desc: 'dark velvet mousse, caramelized hazelnut', price: 13.50, category: 'desserts', image: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&auto=format' }
  ],
  categories: [
    { id: 'all', name: 'All' },
    { id: 'starters', name: 'Starters' },
    { id: 'main', name: 'Main Meals' },
    { id: 'drinks', name: 'Drinks' },
    { id: 'desserts', name: 'Desserts' }
  ],

  // filtered meals
  get filteredMeals() {
    if (this.activeCategory === 'all') return this.meals;
    return this.meals.filter(m => m.category === this.activeCategory);
  },

  // cart helpers
  get cartCount() {
    return this.cart.reduce((acc, item) => acc + item.quantity, 0);
  },
  get cartTotal() {
    return this.cart.reduce((acc, item) => acc + (item.price * item.quantity), 0).toFixed(2);
  },
  addToCart(meal) {
    const existing = this.cart.find(i => i.id === meal.id);
    if (existing) {
      existing.quantity++;
    } else {
      this.cart.push({ ...meal, quantity: 1 });
    }
  },
  removeOne(mealId) {
    const idx = this.cart.findIndex(i => i.id === mealId);
    if (idx !== -1) {
      if (this.cart[idx].quantity > 1) {
        this.cart[idx].quantity--;
      } else {
        this.cart.splice(idx, 1);
      }
    }
  },
  clearCart() {
    this.cart = [];
  },
  // checkout + toast
  placeOrder() {
    if (this.cart.length === 0) {
      this.toast.message = '✨ Add something delicious first';
      this.toast.show = true;
      setTimeout(() => this.toast.show = false, 2000);
      return;
    }
    // generate new batch id
    this.batchId = 'ORD-' + Math.floor(800000 + Math.random()*200000);
    this.showCheckoutModal = true;
  },
  confirmOrder() {
    this.showCheckoutModal = false;
    this.showCart = false;
    this.clearCart();
    // show success toast
    this.toast.message = '🍽️ YOUR ORDER HAS BEEN SENT TO THE KITCHEN. PLEASE CHECK YOUR WHATSAPP FOR ORDER DETAILS.';
    this.toast.show = true;
    setTimeout(() => this.toast.show = false, 4000);
  }
}"
x-init="activeCategory = 'all'"
class="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 pb-20 relative"
>

<!-- STICKY HEADER (golden luxury) -->
<header class="sticky top-0 z-30 sticky-header py-3 sm:py-4 flex items-center justify-between rounded-b-2xl">
  <div class="flex items-center space-x-2">
    <i class="fas fa-utensils text-3xl gold-italic"></i>
    <span class="text-2xl sm:text-3xl gold-italic font-bold tracking-wide">FORK</span>
  </div>
  <button @click="showCart = true" class="relative p-2 rounded-full bg-white/70 border border-[#f0e2cc] shadow-sm">
    <i class="fas fa-shopping-bag text-xl text-[#b68b40]"></i>
    <span x-show="cartCount > 0" x-cloak class="absolute -top-1 -right-1 bg-[#b68b40] text-white text-xs font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center">{{ cartCount }}</span>
  </button>
</header>

<!-- HORIZONTAL CATEGORY PILLS (mobile scroll, desktop wrap) -->
<div class="my-4 flex flex-nowrap md:flex-wrap gap-2 overflow-x-auto pb-2 no-scrollbar md:justify-start scroll-smooth">
  <template x-for="cat in categories" :key="cat.id">
    <button @click="activeCategory = cat.id"
      :class="{ 'active': activeCategory === cat.id }"
      class="category-pill text-sm sm:text-base transition-all">
      <span x-text="cat.name"></span>
    </button>
  </template>
</div>

<!-- MEALS GRID (stunning cards) -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 mt-2">
  <template x-for="meal in filteredMeals" :key="meal.id">
    <div class="bg-white rounded-3xl card-shadow overflow-hidden border border-white/60 flex flex-col">
      <!-- premium image -->
      <div class="h-44 sm:h-48 bg-amber-50 relative">
        <img :src="meal.image" :alt="meal.name" class="w-full h-full object-cover">
        <div class="absolute top-2 right-2 bg-white/80 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-bold text-[#b68b40] border border-[#e9d6b8]">
          $<span x-text="meal.price.toFixed(2)"></span>
        </div>
      </div>
      <!-- card content -->
      <div class="p-4 flex-1 flex flex-col">
        <h3 class="text-xl font-semibold text-[#2c241b]" x-text="meal.name"></h3>
        <p class="text-sm text-[#6b5b4a] mt-1 line-clamp-2" x-text="meal.desc"></p>
        <div class="flex items-center justify-between mt-4">
          <!-- quantity controls (if item in cart) -->
          <template x-for="item in cart.filter(i => i.id === meal.id)" :key="item.id">
            <div class="flex items-center space-x-2 bg-[#fefbf5] rounded-full border border-[#e8dacb] px-1 py-1">
              <button @click="removeOne(meal.id)" class="quantity-btn"><i class="fas fa-minus text-xs"></i></button>
              <span class="font-semibold w-6 text-center" x-text="item.quantity"></span>
              <button @click="addToCart(meal)" class="quantity-btn"><i class="fas fa-plus text-xs"></i></button>
            </div>
          </template>
          <!-- add button if not in cart -->
          <button x-show="!cart.some(i => i.id === meal.id)" @click="addToCart(meal)" class="bg-[#b68b40] hover:bg-[#9e752b] text-white px-5 py-2 rounded-full text-sm font-medium shadow-md flex items-center gap-1 transition">
            <i class="fas fa-plus"></i> <span>Add</span>
          </button>
          <span x-show="!cart.some(i => i.id === meal.id)" class="text-sm text-[#b68b40] font-semibold">$<span x-text="meal.price.toFixed(2)"></span></span>
        </div>
      </div>
    </div>
  </template>
</div>

<!-- CART DRAWER (right side, premium overlay) -->
<div x-show="showCart" class="fixed inset-0 z-50 flex justify-end" @keydown.escape.window="showCart = false">
  <!-- backdrop -->
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" @click="showCart = false"></div>
  <!-- drawer -->
  <div class="relative w-full max-w-md bg-[#fffaf2] h-full shadow-2xl cart-drawer flex flex-col border-l border-[#e9d6b8]" x-show="showCart" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full opacity-0" x-transition:enter-end="translate-x-0 opacity-100" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="translate-x-full opacity-0">
    <div class="flex items-center justify-between p-5 border-b border-[#eddbbc]">
      <h2 class="text-2xl gold-italic font-bold flex items-center gap-2"><i class="fas fa-shopping-bag"></i> your order</h2>
      <button @click="showCart = false" class="w-8 h-8 rounded-full bg-white border border-[#dbb957]"><i class="fas fa-times text-[#b68b40]"></i></button>
    </div>
    <!-- cart items -->
    <div class="flex-1 overflow-y-auto p-5 space-y-5">
      <template x-for="item in cart" :key="item.id">
        <div class="flex items-center gap-4 bg-white p-3 rounded-2xl shadow-sm border border-[#f0e2cc]">
          <img :src="item.image" class="w-16 h-16 rounded-xl object-cover border border-[#eddbbc]">
          <div class="flex-1">
            <h4 class="font-semibold text-[#322b21]" x-text="item.name"></h4>
            <div class="flex items-center justify-between mt-2">
              <div class="flex items-center border border-[#e1cfb5] rounded-full">
                <button @click="removeOne(item.id)" class="px-3 py-1 text-[#b68b40]">−</button>
                <span class="px-3 py-1 font-medium" x-text="item.quantity"></span>
                <button @click="addToCart(item)" class="px-3 py-1 text-[#b68b40]">+</button>
              </div>
              <span class="font-bold text-[#b68b40]" x-text="'$' + (item.price * item.quantity).toFixed(2)"></span>
            </div>
          </div>
        </div>
      </template>
      <div x-show="cart.length === 0" class="text-center py-12 text-[#a78e75] flex flex-col items-center">
        <i class="fas fa-receipt text-5xl mb-3 opacity-30"></i>
        <p>your golden basket awaits</p>
      </div>
    </div>
    <!-- total + checkout -->
    <div class="border-t border-[#eddbbc] p-5 bg-[#fef7ec]">
      <div class="flex justify-between text-lg font-semibold mb-4">
        <span>total</span>
        <span class="gold-italic text-2xl" x-text="'$' + cartTotal"></span>
      </div>
      <button @click="placeOrder()" class="w-full bg-[#1f1a14] hover:bg-[#352e24] text-[#f9e6b6] font-bold py-4 rounded-2xl text-lg shadow-md flex items-center justify-center gap-3 border border-[#dbb957]">
        <i class="fas fa-check-circle"></i> CHECKOUT
      </button>
    </div>
  </div>
</div>

<!-- CHECKOUT MODAL (order summary) -->
<div x-show="showCheckoutModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="showCheckoutModal = false">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="showCheckoutModal = false"></div>
  <div class="relative bg-white max-w-md w-full rounded-3xl p-6 shadow-2xl border border-[#dbb957]"
    x-show="showCheckoutModal" x-transition>
    <h3 class="text-2xl gold-italic font-bold flex items-center gap-2"><i class="fas fa-scroll"></i> order summary</h3>
    <p class="text-sm text-[#b68b40] mt-1">batch: <span class="font-mono" x-text="batchId"></span></p>
    <div class="my-5 max-h-60 overflow-y-auto space-y-3">
      <template x-for="item in cart" :key="item.id">
        <div class="flex justify-between text-base border-b border-[#f0e2cc] pb-2">
          <span><span class="font-bold" x-text="item.quantity"></span> x <span x-text="item.name"></span></span>
          <span class="font-medium" x-text="'$' + (item.price * item.quantity).toFixed(2)"></span>
        </div>
      </template>
    </div>
    <div class="flex justify-between text-xl font-bold border-t border-[#dbb957] pt-3">
      <span>total</span>
      <span class="gold-italic" x-text="'$' + cartTotal"></span>
    </div>
    <div class="flex gap-3 mt-6">
      <button @click="showCheckoutModal = false" class="flex-1 py-3 border border-[#b68b40] rounded-xl text-[#b68b40] font-medium">back</button>
      <button @click="confirmOrder()" class="flex-1 bg-[#b68b40] text-white py-3 rounded-xl font-semibold shadow flex items-center justify-center gap-2">
        <i class="fas fa-whatsapp"></i> confirm
      </button>
    </div>
  </div>
</div>

<!-- TOAST (beautiful auto dismiss) -->
<div x-show="toast.show" x-cloak class="fixed bottom-6 left-4 right-4 md:left-auto md:right-6 md:max-w-sm z-50 toast-animation">
  <div class="bg-[#1f1a14] text-[#f9e6b6] border border-[#dbb957] rounded-2xl shadow-2xl p-4 flex items-center gap-3">
    <i class="fas fa-check-circle text-2xl text-[#dbb957]"></i>
    <span class="flex-1 text-sm font-medium" x-text="toast.message"></span>
    <button @click="toast.show = false" class="text-[#b68b40]"><i class="fas fa-times"></i></button>
  </div>
</div>

</div>

<!-- tiny extra style: hide scrollbar categories but keep function -->
<style>
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  [x-cloak] { display: none !important; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>

</body>
</html>
