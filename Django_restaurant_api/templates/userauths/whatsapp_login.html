<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 max-w-md text-center">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fab fa-whatsapp text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">WhatsApp Ordering</h1>
            <p class="text-gray-600 mb-4">{{ message }}</p>
            <p class="text-sm text-gray-500">Please scan the QR code or click the link sent to your WhatsApp</p>
        </div>
    </div>
</body>
</html>
