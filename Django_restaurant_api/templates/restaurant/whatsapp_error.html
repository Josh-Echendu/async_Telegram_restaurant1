<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Ordering - Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 max-w-md text-center">
            
            <!-- Icon based on error -->
            <div class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-4xl text-white"></i>
            </div>
            
            <h1 class="text-2xl font-bold mb-2">{{ error_title }}</h1>
            <p class="text-gray-600 mb-4">{{ error_message }}</p>
            
            <div class="bg-gray-50 p-4 rounded-lg mb-6">
                <p class="text-sm text-gray-700 mb-3">{{ action_message }}</p>
                
                <!-- WhatsApp Button -->
                <a href="{{ whatsapp_link }}" 
                   class="inline-flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-xl transition-all">
                    <i class="fab fa-whatsapp text-xl"></i>
                    Send "order" on WhatsApp
                </a>
            </div>
            
            <div class="mt-4">
                <p class="text-xs text-gray-400">
                    Restaurant: {{ restaurant_name }}
                </p>
            </div>
            
        </div>
    </div>
</body>
</html>
